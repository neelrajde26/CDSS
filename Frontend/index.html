<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diabetes Risk Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-container">
    <main>
      <section class="hero-card">
        <div>
          <p class="eyebrow">Diabetes AI</p>
          <h1>Predict Diabetes Risk</h1>
          <p class="hero-copy">Enter your key health values below to get a quick risk estimate with a clean and friendly interface.</p>
        </div>
        <div class="hero-badge">Easy</div>
      </section>

      <section class="card form-card">
        <div class="form-grid">
          <div class="form-row">
            <label for="pregnancies">Pregnancies</label>
            <input id="pregnancies" type="number" placeholder="0" min="0" step="1" />
          </div>
          <div class="form-row">
            <label for="glucose">Glucose</label>
            <input id="glucose" type="number" placeholder="120" min="0" step="0.1" />
          </div>
          <div class="form-row">
            <label for="blood_pressure">Blood Pressure</label>
            <input id="blood_pressure" type="number" placeholder="72" min="0" step="0.1" />
          </div>
          <div class="form-row">
            <label for="skin_thickness">Skin Thickness</label>
            <input id="skin_thickness" type="number" placeholder="20" min="0" step="0.1" />
          </div>
          <div class="form-row">
            <label for="insulin">Insulin</label>
            <input id="insulin" type="number" placeholder="85" min="0" step="0.1" />
          </div>
          <div class="form-row">
            <label for="bmi">BMI</label>
            <input id="bmi" type="number" placeholder="32.0" min="0" step="0.1" />
          </div>
          <div class="form-row">
            <label for="diabetes_pedigree">Diabetes Pedigree</label>
            <input id="diabetes_pedigree" type="number" placeholder="0.45" min="0" step="0.001" />
          </div>
          <div class="form-row">
            <label for="age">Age</label>
            <input id="age" type="number" placeholder="45" min="0" step="1" />
          </div>
        </div>

        <div class="submit-row">
          <button class="button" type="button" onclick="predict()">Predict Risk</button>
          <p class="hint">Use real measurements for the best estimate.</p>
        </div>

        <div class="result-panel">
          <p class="result-title">Prediction output</p>
          <p id="result" class="result-text">Your prediction will appear here after clicking Predict.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
