<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div class="page-container">
        <main>
            <section class="hero-card">
                <div>
                    <p class="eyebrow">Health AI</p>
                    <h1>Diabetes Risk Predictor</h1>
                    <p class="hero-copy">Fill in the key endocrine values below to receive a personalized risk estimate powered by a machine learning model.</p>
                </div>
                <div class="hero-badge">Safe | Fast | Easy</div>
            </section>

            <form action="/predict" method="post" class="card form-card">
                <div class="form-grid">
                    <div class="form-row">
                        <label for="pregnancies">Pregnancies</label>
                        <input type="number" name="pregnancies" id="pregnancies" min="0" step="1" required />
                    </div>
                    <div class="form-row">
                        <label for="glucose">Glucose</label>
                        <input type="number" name="glucose" id="glucose" min="0" step="0.1" required />
                    </div>
                    <div class="form-row">
                        <label for="blood_pressure">Blood Pressure</label>
                        <input type="number" name="blood_pressure" id="blood_pressure" min="0" step="0.1" required />
                    </div>
                    <div class="form-row">
                        <label for="skin_thickness">Skin Thickness</label>
                        <input type="number" name="skin_thickness" id="skin_thickness" min="0" step="0.1" required />
                    </div>
                    <div class="form-row">
                        <label for="insulin">Insulin</label>
                        <input type="number" name="insulin" id="insulin" min="0" step="0.1" required />
                    </div>
                    <div class="form-row">
                        <label for="bmi">BMI</label>
                        <input type="number" name="bmi" id="bmi" min="0" step="0.1" required />
                    </div>
                    <div class="form-row">
                        <label for="diabetes_pedigree">Diabetes Pedigree Function</label>
                        <input type="number" name="diabetes_pedigree" id="diabetes_pedigree" min="0" step="0.001" required />
                    </div>
                    <div class="form-row">
                        <label for="age">Age</label>
                        <input type="number" name="age" id="age" min="0" step="1" required />
                    </div>
                </div>

                <div class="submit-row">
                    <button type="submit" class="button">Predict</button>
                    <p class="hint">All fields are required for the best estimate.</p>
                </div>
            </form>
        </main>

        <footer>
            <p>Built with HTML, CSS, Python, and a logistic regression model.</p>
        </footer>
    </div>
</body>
</html>
